version: '3.8'

services:
  backend:
    build: ./backend
    container_name: amelie_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SQLITE_DB_PATH=/app/data/amelie.db
      - CHROMA_DB_PATH=/app/data/chroma_db
    volumes:
      - ./backend:/app
      - amelie_data:/app/data
    depends_on:
      - redis

  worker:
    build: ./backend
    container_name: amelie_worker
    command: celery -A main.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app
      - amelie_data:/app/data
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: amelie_redis
    ports:
      - "6379:6379"

volumes:
  amelie_data:
